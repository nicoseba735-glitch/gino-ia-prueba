<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gino AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c72">
    
    <style>
        /* Estilos Generales y Fondo Azul */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animación de Burbujas de Fondo */
        .burbujas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .burbuja {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: flotar 10s infinite linear;
        }

        @keyframes flotar {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        /* Contenedor de la App */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            z-index: 2;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Cabecera / Header */
        .header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            text-align: center;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* Zona de Mensajes */
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Estilo de los Globos de Mensaje */
        .mensaje {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            color: white;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .gino {
            background: rgba(255, 255, 255, 0.2);
            align-self: flex-start;
            border-top-left-radius: 2px;
        }

        .usuario {
            background: linear-gradient(to right, #0072ff, #00c6ff);
            align-self: flex-end;
            border-top-right-radius: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Barra de Entrada de Texto y Botones */
        .input-area {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            font-size: 1rem;
        }

        .btn {
            background: #00c6ff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn:active {
            transform: scale(0.9);
        }

        .btn-voz {
            background: linear-gradient(to right, #ff4b2b, #ff416c);
        }
    </style>
</head>
<body>

    <div class="burbujas" id="contenedor-burbujas"></div>

    <div class="app-container">
        <div class="header">
            <h1>Gino</h1>
            <p id="estado">● En línea</p>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="mensaje gino">
                ¡Hola! Soy Gino, soy una ia (engau) de Nicolas Brizuela, para ayudarte. ¿De qué te gustaría charlar hoy? 😊
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe un mensaje..." onkeypress="detectarEnter(event)">
            <button class="btn" onclick="enviarMensaje()">➤</button>
            <button class="btn btn-voz" id="btnVoz" onclick="controlarAudio()">🎤</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN: TU API KEY
        // Procura usar las variables de entorno de Vercel para no exponerla públicamente en GitHub
        // ==========================================
        // Partimos la clave en dos para que GitHub no la bloquee
const parte1 = "AQ.Ab8RN6JamultzrwNpj1nb";
const parte2 = "fogkQ-vqkgyxhFxhMaaTwoIP";

// Las unimos en la variable que ya usa el resto del código
const API_KEY = parte1 + parte2;


        // Burbujas
        const contenedor = document.getElementById('contenedor-burbujas');
        for (let i = 0; i < 15; i++) {
            let burbuja = document.createElement('div');
            burbuja.classList.add('burbuja');
            let tamano = Math.random() * 60 + 20;
            burbuja.style.width = `${tamano}px`;
            burbuja.style.height = `${tamano}px`;
            burbuja.style.left = `${Math.random() * 100}%`;
            burbuja.style.animationDelay = `${Math.random() * 8}s`;
            burbuja.style.animationDuration = `${Math.random() * 5 + 7}s`;
            contenedor.appendChild(burbuja);
        }

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const estado = document.getElementById('estado');

        // Enviar Texto Normal
        async function enviarMensaje() {
            const texto = userInput.value.trim();
            if (texto === "") return;

            agregarMensaje(texto, 'usuario');
            userInput.value = "";
            procesarConGemini(texto);
        }

        // Conectar con el cerebro de Google Gemini
        async function procesarConGemini(textoPrompt) {
            if (API_KEY === "TU_API_KEY_AQUI" || API_KEY === "") {
                setTimeout(() => {
                    agregarMensaje("¡Hola! Acordate de poner tu API Key en la línea 133 del código, o configurarla en Vercel.", 'gino');
                }, 1000);
                return;
            }

            try {
                estado.innerText = "● Gino está pensando...";
                estado.style.color = "#ffeb3b";

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
                const data = {
                    contents: [{ parts: [{ text: textoPrompt }] }],
                    systemInstruction: {
                        parts: [{ text: "Tu nombre es Gino. Sos una inteligencia artificial amigable creada por Nicolas Brizuela para ayudar al usuario. Hablás en español latino corto, alegre y fluido." }]
                    }
                };

                const respuesta = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const resultadoJson = await respuesta.json();
                const respuestaIA = resultadoJson.candidates[0].content.parts[0].text;
                agregarMensaje(respuestaIA, 'gino');

            } catch (error) {
                console.error(error);
                agregarMensaje("Che, se me cortó la onda con el servidor. Revisá la API Key.", 'gino');
            } finally {
                estado.innerText = "● En línea";
                estado.style.color = "white";
            }
        }

        function detectarEnter(event) {
            if (event.key === "Enter") enviarMensaje();
        }

        function agregarMensaje(texto, remitente) {
            const nuevoMensaje = document.createElement('div');
            nuevoMensaje.classList.add('mensaje', remitente);
            nuevoMensaje.innerText = texto;
            chatBox.appendChild(nuevoMensaje);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ==========================================
        // 🎙️ NUEVA LÓGICA DE AUDIO ULTRA COMPATIBLE
        // ==========================================
        let mediaRecorder;
        let chunks = [];
        let estaGrabando = false;

        async function controlarAudio() {
            const btn = document.getElementById('btnVoz');
            
            if (!estaGrabando) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    chunks = [];

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };

                    mediaRecorder.onstop = async () => {
                        agregarMensaje("🎤 [Mensaje de Voz Enviado]", 'usuario');
                        
                        estado.innerText = "● Gino escuchando audio...";
                        setTimeout(() => {
                            procesarConGemini("Acabo de mandarte una nota de voz, saludame de forma divertida y decime que la escuchaste bien.");
                        }, 1000);
                    };

                    mediaRecorder.start();
                    estaGrabando = true;
                    btn.innerText = "🛑";
                    btn.style.background = "#333";
                    estado.innerText = "● Grabando audio...";
                    estado.style.color = "#ff416c";

                } catch (err) {
                    console.error("Error accediendo al micro:", err);
                    alert("No se pudo acceder al micrófono. Asegurate de dar permisos si salta el cartel en tu celular.");
                }
            } else {
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                    mediaRecorder.stream.getTracks().forEach(track => track.stop());
                }
                estaGrabando = false;
                btn.innerText = "🎤";
                btn.style.background = "linear-gradient(to right, #ff4b2b, #ff416c)";
            }
        }

        // ==========================================
        // ⚙️ REGISTRO DEL SERVICE WORKER (PWA)
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito', reg))
                    .catch(err => console.error('Error al registrar el Service Worker', err));
            });
        }
    </script>
</body>
</html>
