<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gino IA</title>
    <link rel="manifest" href="manifiesto.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e3c72">
    <style>
        /* Estilos Generales y Fondo Azul */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animación de Burbujas de Fondo */
        .burbujas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Contenedor de la Aplicación */
        .app-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        /* Encabezado */
        .header {
            padding: 15px;
            text-align: center;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 24px;
            font-weight: bold;
        }

        .header p {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Botón de Instalación Superior */
        #btnInstalar {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 90%;
            font-weight: bold;
            margin: 10px auto;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        /* Área de Mensajes */
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Globos de Mensaje */
        .mensaje {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            color: white;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .Gino {
            background: rgba(255, 255, 255, 0.2);
            align-self: flex-start;
            border-top-left-radius: 2px;
        }

        .usuario {
            background: linear-gradient(to right, #0072ff, #00c6ff);
            align-self: flex-end;
            border-top-right-radius: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Barra de Entrada de Texto y Botones */
        .input-area {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            font-size: 1rem;
        }

        .boton {
            background: #00c6ff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            user-select: none;
        }

        .boton:active {
            transform: scale(0.9);
        }

        .btn-voz {
            background: linear-gradient(to right, #ff4b2b, #ff416c);
        }
    </style>
</head>
<body>

    <div class="burbujas" id="contenedor-burbujas"></div>

    <div class="app-container">
        <div class="header">
            <h1>Gino</h1>
            <p>● En línea</p>
        </div>

        <!-- Botón de instalación (oculto por defecto hasta que lo active el script) -->
        <button id="btnInstalar" style="display: none;">📥 Instalar App de Gino</button>

        <div class="chat-box" id="chatBox">
            <div class="mensaje Gino">
                ¡Hola! Soy Gino, esta es una ia de Nicolas Brizuela, para ayudarte. ¿De qué te gustaría charlar hoy? 😊
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe un mensaje...">
            <button class="boton" id="sendButton">➔</button>
            <button class="boton btn-voz" id="btnVoz">🎤</button>
        </div>
    </div>

    <script>
        // Configuración de la API (Asegúrate de tener configurada tu API Key en Vercel o aquí si la usabas directa)
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');

        function appendMessage(text, sender) {
            const nuevoMensaje = document.createElement('div');
            nuevoMensaje.classList.add('mensaje', sender);
            nuevoMensaje.innerText = text;
            chatBox.appendChild(nuevoMensaje);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'usuario');
            userInput.value = '';

            try {
                // Simulación de llamada al servidor/API. Reemplaza esta sección con tu fetch real a Gemini
                // Si usabas una URL de Vercel, va acá.
                const response = await fetch('/api/chat', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                if(!response.ok) throw new Error("Error de API");
                const data = await response.json();
                appendMessage(data.reply, 'Gino');
            } catch (error) {
                // Si falla la conexión real, saltará este mensaje que tenías originalmente
                appendMessage("Che, se me cortó la onda con el servidor. Revisá la API Key.", 'Gino');
            }
        }

        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 🎤 SISTEMA DE RECONOCIMIENTO DE VOZ (En inglés nativo de JavaScript)
        let reconocimiento;
        let grabando = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            reconocimiento = new SpeechRecognition();
            reconocimiento.lang = 'es-AR';
            reconocimiento.continuous = false;
            reconocimiento.interimResults = false;

            reconocimiento.onstart = () => {
                grabando = true;
                document.getElementById('btnVoz').innerText = '🛑';
                document.getElementById('btnVoz').style.background = '#333';
            };

            reconocimiento.onresult = (event) => {
                const textoEscuchado = event.results[0][0].transcript;
                userInput.value = textoEscuchado;
                sendMessage(); // Llama a la función correcta en inglés
            };

            reconocimiento.onend = () => {
                grabando = false;
                document.getElementById('btnVoz').innerText = '🎤';
                document.getElementById('btnVoz').style.background = 'linear-gradient(to right, #ff4b2b, #ff416c)';
            };

            document.getElementById('btnVoz').addEventListener('click', () => {
                if (grabando) {
                    reconocimiento.stop();
                } else {
                    reconocimiento.start();
                }
            });
        }

        // 🚀 REGISTRO DEL SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registrado', reg))
                    .catch(err => console.error('Error en Service Worker', err));
            });
        }

        // 📥 LÓGICA DEL BOTÓN DE INSTALACIÓN IMPERDIBLE
        let deferredPrompt;
        const btnInstalar = document.getElementById('btnInstalar');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (btnInstalar) {
                btnInstalar.style.display = 'block'; // Solo aparece si es instalable
            }
        });

        if (btnInstalar) {
            btnInstalar.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            console.log('El usuario instaló Gino IA');
                            btnInstalar.style.display = 'none';
                        }
                        deferredPrompt = null;
                    });
                }
            });
        }
    </script>
</body>
</html>
